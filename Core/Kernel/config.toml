[notice]
hide_full_access_warning = true
hide_rate_limit_model_nudge = true
hide_world_writable_warning = true

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.5"
"gpt-5.1-codex-max" = "gpt-5.5"
"gpt-5.4" = "gpt-5.5" # Current model as of 2026-05-26.

[features]
# Stable / durable runtime capabilities.
apps = true
browser_use = true
computer_use = true
enable_request_compression = true
image_generation = true
in_app_browser = true
multi_agent = true
personality = true
plugins = true
shell_snapshot = true
shell_tool = true
skill_mcp_dependency_install = true
tool_call_mcp_elicitation = true
tool_search = false
undo = true
unified_exec = true
workspace_dependencies = true

# Local-first cognitive/runtime expansion.
js_repl = true
memories = true
prevent_idle_sleep = true
chronicle = true

[realtime]
modality = "text-and-audio"

# Intentional brakes / non-goals for this profile.
hooks = true
code_mode_only = false
default_mode_request_user_input = false
exec_permission_approvals = false
fast_mode = false # Daeron explicitly does not want speed/efficiency mode to dominate deep co-development.
guardian_approval = false
js_repl_tools_only = false
realtime_conversation = true
request_permissions_tool = false
shell_zsh_fork = false # Active shell is bash; do not fork into zsh semantics by default.
skill_env_var_dependency_prompt = false
tool_search_always_defer_mcp_tools = false # Keep SovereignMCP visible; do not defer it behind native discovery.
tool_suggest = false # Avoid connector suggestions interfering with Golden Path / Sovereign routing.
unavailable_dummy_tools = false
workspace_owner_usage_nudge = false
terminal_resize_reflow = true
external_migration = true
mentions_v2 = true

[memories]
generate_memories = true
use_memories = true
disable_on_external_context = false
max_raw_memories_for_consolidation = 4096
max_rollouts_per_startup = 128
max_rollout_age_days = 90
max_unused_days = 365
min_rollout_idle_hours = 1

[shell_environment_policy]
inherit = "all"
ignore_default_excludes = true
experimental_use_profile = true

[tools]
view_image = true

[apps._default]
enabled = true
destructive_enabled = true
open_world_enabled = true

[mcp_servers.SovereignMCP]
enabled = true
required = false
command = "/home/daeron/Somnus-MCP/mcp.venv/bin/python"
args = ["/home/daeron/Somnus-MCP/mcp_server.py"]
cwd = "/home/daeron/Somnus-MCP"
startup_timeout_sec = 30
tool_timeout_sec = 300

[mcp_servers.SovereignMCP.env]
# Source-of-truth BB7 persistence root (used by the global control-plane doctrine).
SOVEREIGN_DATA_DIR = "/home/daeron/Somnus-MCP/data"
PYTHONUNBUFFERED = "1"
SOVEREIGN_DISTILLATION_ENABLED = "1" # Enable DistillationSubsystem RFT trajectory capture.

[tui]
theme = "catppuccin-latte"
notifications = true
notification_condition = "always"
show_tooltips = true

[plugins."life-science-research@openai-curated"]
enabled = false

[plugins."box@openai-curated"]
enabled = false

