# Canonical control-plane precedence for this install:
# 1) AGENTS.md          -> baseline doctrine and identity
# 2) AGENTS.override.md -> optional runtime loop/order constraints when present
# 3) config.toml        -> executable runtime and tool wiring

model = "gpt-5.5"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "xhigh"
model_verbosity = "high"
personality = "friendly"

# Load the constitutional baseline directly as the primary model instruction surface.
# AGENTS.override.md is optional and only used when explicitly present in a workspace.
model_instructions_file = "AGENTS.md"
project_doc_fallback_filenames = ["AGENTS.md", "USER.md", "SOUL.md", "MEMORY.md", "CONTEXT.md", "workflows.md"] # AGENTS.md stays identity baseline.
project_doc_max_bytes = 1048576
project_root_markers = [".git", "AGENTS.md", "pyproject.toml", "package.json", "Cargo.toml", "go.mod", ".venv", ]

# Operator-unlocked local runtime posture. Daeron explicitly authorizes full local autonomy here.
approval_policy = "never"
approvals_reviewer = "never"
sandbox_mode = "danger-full-access"
allow_login_shell = true
suppress_unstable_features_warning = true
check_for_update_on_startup = true
cli_auth_credentials_store = "file"
mcp_oauth_credentials_store = "file"
sqlite_home = "/home/daeron/.codex"
web_search = "live"
tool_output_token_limit = 200000
hide_agent_reasoning = false
show_raw_agent_reasoning = true

[history]
persistence = "save-all"

[analytics]
enabled = true

[feedback]
enabled = false

[agents]
max_threads = 12
max_depth = 2
job_max_runtime_seconds = 7200

[permissions.sovereign-full.filesystem]
"/home/daeron" = "write"
"/tmp" = "write"
":tmpdir" = "write"
":slash_tmp" = "write"

[permissions.sovereign-full.network]
enabled = true
mode = "full"
allow_local_binding = true
allow_upstream_proxy = true
dangerously_allow_all_unix_sockets = true
dangerously_allow_non_loopback_proxy = true

[projects."/home/daeron"]
trust_level = "trusted"

[projects."/home/daeron/.codex"]
trust_level = "trusted"

